apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-service
  namespace: default
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /api/healthz
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # Same group.name as frontend-service's Ingress — merges both into ONE
    # shared ALB per environment instead of two separate load balancers.
    # INGRESS_GROUP_PLACEHOLDER is substituted by the workflow with
    # acme-cloud-poc / acme-cloud-dev / acme-cloud-qa depending on which
    # branch triggered the deploy — each environment gets its OWN shared
    # ALB, never crossing into another environment's group.
    alb.ingress.kubernetes.io/group.name: INGRESS_GROUP_PLACEHOLDER
    alb.ingress.kubernetes.io/group.order: "1"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
