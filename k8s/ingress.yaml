apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-service
  namespace: default
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /api/healthz
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # Same group.name as frontend-service's Ingress — merges both into ONE
    # shared ALB instead of two separate load balancers. Lower group.order
    # evaluates first, so /api (more specific) is matched before frontend's
    # catch-all "/" rule.
    alb.ingress.kubernetes.io/group.name: acme-cloud-poc
    alb.ingress.kubernetes.io/group.order: "1"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80